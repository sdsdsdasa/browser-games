<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    button {
      padding: 0.6rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: scale(1.03); }

    #restart {
      background: #e94560;
      color: #fff;
    }

    #modeToggle {
      background: #a8dadc;
      color: #1a1a2e;
    }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2.5rem;
      font-size: 1rem;
      color: #aaa;
    }

    #score span { font-size: 1.4rem; font-weight: bold; }
    .score-x span { color: #e94560; }
    .score-o span { color: #a8dadc; }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<div id="status">X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div id="controls">
  <button id="restart">Restart</button>
  <button id="modeToggle">vs CPU</button>
</div>

<div id="score">
  <div class="score-x">X &nbsp;<span id="scoreX">0</span></div>
  <div>Draws &nbsp;<span id="scoreD">0</span></div>
  <div class="score-o">O &nbsp;<span id="scoreO">0</span></div>
</div>

<script>
  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');
  const modeToggle = document.getElementById('modeToggle');

  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, gameOver, vsCPU;
  let scores = { X: 0, O: 0, D: 0 };
  vsCPU = false;

  function init() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    status.textContent = "X's turn";
  }

  function checkWinner() {
    for (const [a,b,c] of wins) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return { winner: board[a], line: [a,b,c] };
      }
    }
    if (board.every(Boolean)) return { winner: null, line: [] };
    return null;
  }

  function highlight(line) {
    line.forEach(i => cells[i].classList.add('win'));
  }

  function endGame(result) {
    gameOver = true;
    if (result.winner) {
      highlight(result.line);
      status.textContent = `${result.winner} wins!`;
      scores[result.winner]++;
    } else {
      status.textContent = "It's a draw!";
      scores.D++;
    }
    document.getElementById('scoreX').textContent = scores.X;
    document.getElementById('scoreO').textContent = scores.O;
    document.getElementById('scoreD').textContent = scores.D;
  }

  function minimax(b, isMax) {
    const r = checkBoardResult(b);
    if (r === 'O') return 10;
    if (r === 'X') return -10;
    if (r === 'draw') return 0;

    const scores = [];
    b.forEach((v, i) => {
      if (!v) {
        b[i] = isMax ? 'O' : 'X';
        scores.push(minimax(b, !isMax));
        b[i] = '';
      }
    });
    return isMax ? Math.max(...scores) : Math.min(...scores);
  }

  function checkBoardResult(b) {
    for (const [a,c,d] of wins) {
      if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
    }
    if (b.every(Boolean)) return 'draw';
    return null;
  }

  function cpuMove() {
    let best = -Infinity, move = -1;
    board.forEach((v, i) => {
      if (!v) {
        board[i] = 'O';
        const s = minimax(board, false);
        board[i] = '';
        if (s > best) { best = s; move = i; }
      }
    });
    if (move !== -1) makeMove(move);
  }

  function makeMove(i) {
    if (board[i] || gameOver) return;
    board[i] = current;
    cells[i].textContent = current;
    cells[i].classList.add(current.toLowerCase(), 'taken');

    const result = checkWinner();
    if (result) { endGame(result); return; }

    current = current === 'X' ? 'O' : 'X';
    status.textContent = `${current}'s turn`;

    if (vsCPU && current === 'O' && !gameOver) {
      setTimeout(cpuMove, 300);
    }
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      if (vsCPU && current === 'O') return;
      makeMove(+cell.dataset.i);
    });
  });

  document.getElementById('restart').addEventListener('click', init);

  modeToggle.addEventListener('click', () => {
    vsCPU = !vsCPU;
    modeToggle.textContent = vsCPU ? 'vs Human' : 'vs CPU';
    init();
  });

  init();
</script>
</body>
</html>
